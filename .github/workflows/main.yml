name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest


    steps:

    - uses: actions/checkout@v5


    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable


    - name: Flutter Doctor
      run: flutter doctor -v


    - name: Get packages
      run: flutter pub get


    - name: Clean
      run: flutter clean


    - name: Install pods
      run: |
        cd ios
        pod install
        cd ..


    - name: Build iOS
      run: flutter build ios --release --no-codesign


    - name: Make IPA
      run: |
        mkdir -p Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -qq -r app.ipa Payload


    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: iOS-IPA
        path: app.ipa
